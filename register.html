<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Antique Arms</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--primary-bg);
            padding: 80px 20px 50px;
        }
        .auth-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            margin: auto;
        }
    </style>
</head>
<body>
    <div class="position-fixed top-0 end-0 p-4 d-flex gap-2" style="z-index: 1000;">
        <button class="btn nav-btn" id="theme-toggle" title="Toggle Theme"><i class="bi bi-sun-fill"></i></button>
        <button class="btn nav-btn" id="rtl-toggle" title="Toggle RTL"><i class="bi bi-arrow-left-right"></i></button>
    </div>

    <div class="auth-card text-center">
        <a href="index.html" class="navbar-brand d-block mb-4">
            <i class="bi bi-shield-shaded me-2"></i>ANTIQUE ARMS
        </a>
        <h3 class="mb-4">Create Account</h3>
        
        <form>
            <div class="mb-3 text-start">
                <label class="small mb-1">Full Name</label>
                <input type="text" class="form-control p-2" placeholder="Elias Thorne">
            </div>
            <div class="mb-3 text-start">
                <label class="small mb-1">Email Address</label>
                <input type="email" class="form-control p-2" placeholder="name@example.com">
            </div>
            <div class="mb-3 text-start">
                <label class="small mb-1">Password</label>
                <div class="password-wrapper">
                    <input type="password" class="form-control p-2" placeholder="••••••••">
                    <span class="password-toggle"><i class="bi bi-eye-fill"></i></span>
                </div>
            </div>
            
            <div class="mb-4 text-start">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="terms" required>
                    <label class="form-check-label small text-muted-text" for="terms">
                        I agree to the <a href="#" class="text-gold">Terms & Conditions</a>
                    </label>
                </div>
            </div>

            <button class="btn btn-premium w-100 py-2 mb-4">Create Account</button>

            <div class="d-flex align-items-center mb-4">
                <hr class="flex-grow-1">
                <span class="px-3 small text-muted-text">OR</span>
                <hr class="flex-grow-1">
            </div>

            <div class="social-logins mb-4">
                <button class="btn-social" type="button">
                    <i class="bi bi-google"></i> Continue with Google
                </button>
                <button class="btn-social" type="button">
                    <i class="bi bi-apple"></i> Continue with Apple
                </button>
            </div>

            <p class="small text-muted-text">Already have an account? <a href="login.html" class="text-gold">Login</a></p>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
