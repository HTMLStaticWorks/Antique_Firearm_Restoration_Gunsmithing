<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <meta charset="UTF-8">
    <title>Coming Soon | Antique Arms</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: var(--primary-bg);
            text-align: center;
        }
        .timer {
            font-size: 3rem;
            font-family: var(--font-heading);
            color: var(--accent-gold);
            margin: 40px 0;
        }
    </style>
</head>
<body>

    <h1 class="display-3">Our New Gallery is Coming</h1>
    <p class="text-muted-text">We are meticulously preparing our latest acquisitions for public viewing.</p>
    
    <div class="timer">
        12 : 08 : 45 : 02
        <div class="d-flex justify-content-center gap-4 fs-6 text-uppercase" style="letter-spacing: 2px;">
            <span>Days</span><span>Hrs</span><span>Min</span><span>Sec</span>
        </div>
    </div>

    <div style="max-width: 400px; width: 100%;">
        <form class="d-flex gap-2">
            <input type="email" class="form-control bg-transparent border-gold text-white" placeholder="Get Notified">
            <button class="btn btn-premium">Join</button>
        </form>
    </div>

    <div class="social-icons mt-5">
        <a href="#"><i class="bi bi-instagram"></i></a>
        <a href="#"><i class="bi bi-facebook"></i></a>
        <a href="#"><i class="bi bi-youtube"></i></a>

</html>
